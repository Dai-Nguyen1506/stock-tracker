services:
  # ── 1. DATABASE ──────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: "StockCluster"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      MAX_HEAP_SIZE: "2G"     # Tăng lên 2G cho 11k writes/s
      HEAP_NEWSIZE: "512M"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra   # Data persist sau khi container stop
    networks:
      - stock_network
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra 9042 -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s   # Cassandra khởi động chậm, chờ 90s trước khi check

  # ── 1.1 SCHEMA INIT ──────────────────────────────────
  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    networks:
      - stock_network
    command: >
      /bin/bash -c "
      set -e;
      echo 'Waiting for Cassandra port 9042 to be fully ready...';
      until cqlsh cassandra 9042 -e 'describe keyspaces' > /dev/null 2>&1; do
        sleep 5;
      done;
      echo 'Cassandra is up! Running init.cql...';
      cqlsh cassandra 9042 -f /init.cql;
      echo 'Cassandra schema initialized successfully.'"
    restart: "no"

  # ── 1.2 VECTOR DB & CACHE ────────────────────────────
  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - stock_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - stock_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── 2. BACKEND ───────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8001:8000" # Đổi cổng public vì ChromaDB đã dùng 8000
    env_file:
      - .env
    environment:
      CASSANDRA_HOST: cassandra   # Tên service = hostname trong Docker network
      APP_ENV: production
      UVICORN_WORKERS: "2"
      REDIS_URL: redis://redis:6379/0
      PG_URL: postgresql://user:password@postgres:5432/market_data
      CHROMA_HOST: chromadb
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - ./backend:/app
      - ./.cache:/home/appuser/.cache
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: ["/bin/sh", "-c", "uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"]

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stock_network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_data
    ports:
      - "5432:5432"
    networks:
      - stock_network
    restart: unless-stopped
    # Không map volume để xoá sạch dữ liệu khi tắt container

  ingestion-binance:
    build: ./backend
    env_file:
      - .env
    environment:
      CASSANDRA_HOST: cassandra
      REDIS_URL: redis://redis:6379/0
      PG_URL: postgresql://user:password@postgres:5432/market_data
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped
    command: ["python", "ingestion/binance_ws.py"]

  ingestion-alpaca:
    build: ./backend
    env_file:
      - .env
    environment:
      CASSANDRA_HOST: cassandra
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      ANONYMIZED_TELEMETRY: "False"
      PYTHONPATH: /app
      HF_HOME: /tmp/hf_cache
      SENTENCE_TRANSFORMERS_HOME: /tmp/st_cache
    volumes:
      - ./backend:/app
      - ./.cache:/home/appuser/.cache
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped
    command: ["python", "ingestion/alpaca_ws.py"]

networks:
  stock_network:
    driver: bridge

# ── VOLUMES ──────────────────────────────────────────
volumes:
  cassandra_data:
  chroma_data:
  redis_data:
  chroma_cache:
  chromadb_data: